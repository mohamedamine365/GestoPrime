<div class="main-container animate-fade-in">
  <div class="header-section d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="page-title text-dark fw-bold">Unité Gestionnaire</h2>
      <p class="text-muted mb-0">Total : <span class="badge bg-primary">{{ items.length }}</span> dossiers</p>
    </div>

    <div class="search-wrapper">
      <div class="input-group shadow-sm" style="width: 350px;">
        <span class="input-group-text bg-white border-end-0">
          <i class="bi bi-search text-muted"></i>
        </span>
        <input 
          type="text" 
          class="form-control border-start-0 ps-0" 
          placeholder="Rechercher unité ou code..." 
          [(ngModel)]="searchTerm"
          (input)="onSearch()">
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm overflow-hidden">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="bg-light">
          <tr>
            <th class="ps-4 py-3 text-secondary text-uppercase small fw-bold">Unité Gestionnaire</th>
            <th class="text-center py-3 text-secondary text-uppercase small fw-bold">Code Unité</th>
            <th class="py-3 text-secondary text-uppercase small fw-bold">Nom & Prénom / Libellé</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="loading">
            <td colspan="3" class="text-center py-5">
              <div class="spinner-border text-primary spinner-border-sm"></div>
            </td>
          </tr>

          <tr *ngFor="let item of items">
            <td class="ps-4">
              <span class="text-dark">{{ item.uniteGestionnaire }}</span>
            </td>
            <td class="text-center">
              <span class="badge border text-primary px-3 bg-white">{{ item.codeUnite }}</span>
            </td>
            <td>
              <span class="fw-semibold">{{ item.nomPrenom }}</span>
            </td>
          </tr>

          <tr *ngIf="items.length === 0 && !loading">
            <td colspan="3" class="text-center py-5 text-muted">
              Aucune donnée disponible.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
