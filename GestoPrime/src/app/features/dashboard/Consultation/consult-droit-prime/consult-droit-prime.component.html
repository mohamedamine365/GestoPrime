<div class="main-container animate-fade-in">
  <div class="header-section d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="page-title text-dark fw-bold">Droits Primes</h2>
      <p class="text-muted mb-0">Nombre des dossiers sélectionnés : <strong>{{ items.length }}</strong></p>
    </div>

    <div class="search-wrapper">
      <div class="input-group shadow-sm" style="width: 450px;">
        <span class="input-group-text bg-white border-end-0">
          <i class="bi bi-search text-muted"></i>
        </span>
        <input 
          type="text" 
          class="form-control border-start-0 ps-0" 
          placeholder="Rechercher unité, matricule ou nom..." 
          [(ngModel)]="searchTerm"
          (input)="chargerDonnees()">
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm overflow-hidden">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="bg-light">
          <tr>
            <th class="ps-4 py-3 text-secondary small fw-bold">Unité Gestionnaire</th>
            <th class="py-3 text-secondary small fw-bold">Matricule Resp</th>
            <th class="py-3 text-secondary small fw-bold">Nom & Prénom Resp</th>
            <th class="text-center py-3 text-secondary small fw-bold">Droit Hygiène</th>
            <th class="text-center py-3 text-secondary small fw-bold">Droit Productivité</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="loading">
            <td colspan="5" class="text-center py-5">
              <div class="spinner-border text-primary spinner-border-sm"></div>
            </td>
          </tr>

          <tr *ngFor="let item of items">
            <td class="ps-4">
              <small class="text-uppercase fw-medium text-muted">{{ item.uniteGestionnaire }}</small>
            </td>
            <td>
              <code class="text-primary fw-bold">{{ item.matriculeResp }}</code>
            </td>
            <td>
              <span class="fw-semibold text-dark">{{ item.nomPrenomResp }}</span>
            </td>
            <td class="text-center">
              <span [class]="item.droitHygiene ? 'badge bg-success-subtle text-success border border-success-subtle' : 'badge bg-danger-subtle text-danger border border-danger-subtle'" style="min-width: 60px;">
                {{ item.droitHygiene }}
              </span>
            </td>
            <td class="text-center">
              <span [class]="item.droitProductivite ? 'badge bg-success-subtle text-success border border-success-subtle' : 'badge bg-danger-subtle text-danger border border-danger-subtle'" style="min-width: 60px;">
                {{ item.droitProductivite }}
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
