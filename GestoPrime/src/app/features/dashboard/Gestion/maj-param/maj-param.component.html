<div class="sync-container">
  <div class="sync-card shadow-sm">
    <div class="mb-4">
      <i class="bi bi-database-fill-gear text-secondary" style="font-size: 3rem;"></i>
    </div>
    
    <h4 class="fw-bold text-dark mb-3">Mise à jour du Système</h4>
    <p class="text-muted mb-5">
      Cette action synchronisera les paramètres des unités de gestionnaire et recalculera l'ensemble du pointage.
    </p>

    <button 
      class="btn-sync" 
      (click)="onMiseAJour()" 
      [disabled]="loading">
      <div class="d-flex align-items-center justify-content-center">
        <i *ngIf="!loading" class="bi bi-arrow-repeat fs-5 me-2"></i>
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status"></span>
        <span class="text-uppercase tracking-wider">
          {{ loading ? 'Traitement en cours...' : 'Lancer la mise à jour' }}
        </span>
      </div>
    </button>
  </div>
</div>
