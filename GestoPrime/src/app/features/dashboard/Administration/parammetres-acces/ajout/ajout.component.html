<div class="modal-container p-3">
  <div class="d-flex align-items-center gap-3 mb-4">
    <div class="icon-circle bg-primary-subtle text-primary p-3 rounded-3">
      <i class="bi bi-person-lock fs-4"></i>
    </div>
    <h3 class="fw-bold m-0">Nouvel Accès</h3>
  </div>

  <div class="row g-3">
    <div class="col-12">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Matricule</mat-label>
        <input matInput [(ngModel)]="data.matricule" (input)="onMatriculeChange()" placeholder="Ex: 4588">
        <div matSuffix class="pe-3">
          <mat-spinner *ngIf="isSearching" [diameter]="20"></mat-spinner>
        </div>
      </mat-form-field>
    </div>

    <div class="col-12">
      <mat-form-field appearance="outline" class="w-100 bg-light">
        <mat-label>Nom & Prénom</mat-label>
        <input matInput [(ngModel)]="data.nom_Prenom" readonly tabindex="-1">
      </mat-form-field>
    </div>

    <div class="col-12">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Privilège</mat-label>
        <mat-select [(ngModel)]="data.privilege">
          <mat-option value="Admin">Admin</mat-option>
          <mat-option value="Gestion">Gestion</mat-option>
          <mat-option value="Evaluation">Évaluation</mat-option>
          <mat-option value="Centralisateur">Centralisateur</mat-option>
          <mat-option value="Supervision">Supervision</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="col-12">
      <mat-form-field appearance="outline" class="w-100 bg-light">
        <mat-label>Établissement</mat-label>
        <input matInput [(ngModel)]="data.etablissement" readonly tabindex="-1">
      </mat-form-field>
    </div>
  </div>

  <div class="modal-container p-3">
  <div class="row g-3">
    </div>

  <div class="d-flex justify-content-end gap-2 mt-4">
    <button mat-button (click)="annuler()" [disabled]="isLoading">Annuler</button>
    <button mat-raised-button color="primary" 
            [disabled]="!data.nom_Prenom || isLoading" 
            (click)="enregistrer()">
      <div class="d-flex align-items-center">
        <mat-spinner *ngIf="isLoading" diameter="18" class="me-2"></mat-spinner>
        {{ isLoading ? 'Enregistrement...' : 'Confirmer l\'accès' }}
      </div>
    </button>
  </div>
</div>
</div>
