<div class="login-wrapper">
  <div class="login-content shadow-lg border-0">
    <div class="login-header text-center">
      <img src="assets/images/GestoPrime.png" alt="Logo" class="login-logo mb-3">
      <h4 class="fw-bold text-dark">Portail GestoPrime</h4>
      <p class="text-muted small">Veuillez vous authentifier pour accéder au SIRH</p>
    </div>

    <form #loginForm="ngForm" (ngSubmit)="onLogin()" class="mt-4">
      <div class="form-floating mb-3">
        <input 
          type="text" 
          name="username" 
          class="form-control custom-input" 
          id="userInput"
          [(ngModel)]="user.username" 
          placeholder="Nom d'utilisateur"
          required>
        <label for="userInput" class="text-muted small"><i class="bi bi-person me-2"></i>Nom d'utilisateur</label>
      </div>

      <div class="form-floating mb-4">
        <input 
          type="password" 
          name="password" 
          class="form-control custom-input" 
          id="passInput"
          [(ngModel)]="user.password" 
          placeholder="Mot de passe"
          required>
        <label for="passInput" class="text-muted small"><i class="bi bi-lock me-2"></i>Mot de passe</label>
      </div>

      <button 
        type="submit" 
        class="btn btn-login w-100 py-3 fw-bold text-uppercase" 
        [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Se connecter</span>
        <div *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status"></div>
      </button>
    </form>
    
    <div class="login-footer mt-5 text-center">
      <p class="mb-0 text-muted x-small">
        <img src="assets/images/sirhp.png" alt="Poulina" style="height: 35px; opacity: 0.6; margin-right: 8px;">
        © 2026 GestoPrime - Poulina Group
      </p>
    </div>
  </div>
</div>
