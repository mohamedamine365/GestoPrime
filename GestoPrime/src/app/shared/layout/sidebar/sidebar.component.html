<aside class="sidebar bg-white border-end shadow-sm">
  <div class="brand-wrapper d-flex align-items-center px-4">
  </div>

  <div class="sidebar-content p-3">
    <p class="menu-label">Acceuill</p>

    <div class="menu-item-container">
      <div 
        class="nav-item-header d-flex align-items-center justify-content-between px-3 py-2 rounded-3 mb-1"
        (click)="toggleAdminMenu()"
        [class.header-active]="isAdminMenuOpen">
        <div class="d-flex align-items-center">
          <i class="bi bi-person-badge-fill me-2"></i>
          <span class="fw-semibold">Administration</span>
        </div>
        <i class="bi" [ngClass]="isAdminMenuOpen ? 'bi-chevron-up' : 'bi-chevron-down'" style="font-size: 0.8rem;"></i>
      </div>

      <nav class="nav flex-column gap-1 sub-menu" *ngIf="isAdminMenuOpen">
        <a routerLink="statistics" routerLinkActive="active" class="sidebar-link">
          <i class="bi bi-pie-chart-fill"></i>
          <span>Statistiques</span>
        </a>
        
        <a routerLink="mouvements" routerLinkActive="active" class="sidebar-link">
          <i class="bi bi-list-columns-reverse"></i>
          <span>Journal Mouvements</span>
        </a>
        
        <a routerLink="access" routerLinkActive="active" class="sidebar-link">
          <i class="bi bi-key-fill"></i>
          <span>Paramétrage Accès</span>
        </a>
      </nav>
    </div>
  </div>
 <div class="menu-item-container mt-2">
  <div 
    class="nav-item-header d-flex align-items-center justify-content-between px-3 py-2 rounded-3 mb-1"
    (click)="toggleGestionMenu()"
    [class.header-active]="isGestionMenuOpen">
    <div class="d-flex align-items-center">
      <i class="bi bi-person-gear me-2"></i>
      <span class="fw-semibold">Gestion</span>
    </div>
    <i class="bi" [ngClass]="isGestionMenuOpen ? 'bi-chevron-up' : 'bi-chevron-down'" style="font-size: 0.8rem;"></i>
  </div>

  @if (isGestionMenuOpen) {
    <nav class="nav flex-column gap-1 sub-menu">
      <a routerLink="gestion/maj-salarie" routerLinkActive="active" class="sidebar-link">
        <i class="bi bi-arrow-repeat"></i>
        <span>Maj.Salarié</span>
      </a>
      
      <a routerLink="gestion/maj-score" routerLinkActive="active" class="sidebar-link">
        <i class="bi bi-file-earmark-check-fill"></i>
        <span>Maj.Score.PPM</span>
      </a>
    </nav>
  }
</div>

</aside>
